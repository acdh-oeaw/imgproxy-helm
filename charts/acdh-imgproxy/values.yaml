global: {}

imgproxy:
  image:
    tag: v4

  env:
    IMGPROXY_DOWNLOAD_TIMEOUT: '7'
    IMGPROXY_TIMEOUT: '9'
    AWS_ACCESS_KEY_ID: 9XBDV
    AWS_SECRET_ACCESS_KEY: abcdefG0
    IMGPROXY_KEY: >-
      def345
    IMGPROXY_MAX_ANIMATION_FRAMES: '200'
    IMGPROXY_MAX_SRC_RESOLUTION: '50'
    IMGPROXY_OPEN_TELEMETRY_ENABLE: 'true'
    IMGPROXY_PROMETHEUS_BIND: ':8081'
    IMGPROXY_S3_ENDPOINT: http://k8s-s3-access.s3.svc:8080
    IMGPROXY_SALT: >-
      abc123
    IMGPROXY_USE_S3: 'true'
    OTEL_EXPORTER_OTLP_ENDPOINT: http://k8s-otel.otel.svc:4317
    OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://k8s-otel.otel.svc:4317
    OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: grpc
    OTEL_SERVICE_NAME: imgproxy

  resources:
    common:
      labels:
        ID: "99999"

    addSecrets:
      - imgproxy-imgproxy-env-filesystem

    # The wrapper chart owns the public Ingress so it can route through Nginx.
    ingress:
      enabled: false

  persistence:
    enabled: true
    existingClaim: acdh-resources-container
    mountPath: /images/container
    accessModes:
      - ReadOnlyMany

cache:
  fullnameOverride: imgproxy-cache
  replicas: 2

  image:
    repository: nginxinc/nginx-unprivileged
    tag: 1-alpine-otel
    pullPolicy: IfNotPresent

  config:
    cacheMaxSize: 4g
    inactive: 30d
    keysZoneSize: 20m
    validNotFound: 1m
    validSuccess: 30d
    otelEndpoint: http://localhost:4317

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
      ephemeral-storage: 512Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 5Gi

  storage:
    cacheSizeLimit: 5Gi
    tmpSizeLimit: 64Mi

  service:
    port: 80

origin:
  service:
    # Empty uses "<release-name>-imgproxy", matching the upstream dependency.
    name: ""
    port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - imgproxy.example.org
  path: /
  pathType: ImplementationSpecific
  tls:
    secretName: imgproxy-cert

