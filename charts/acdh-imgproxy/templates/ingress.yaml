{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "acdh-imgproxy.ingressName" . }}
  labels:
    {{- include "acdh-imgproxy.labels" . | nindent 4 }}
    app: {{ include "acdh-imgproxy.ingressName" . }}
    imgproxy: "true"
    release: {{ .Release.Name | quote }}
    heritage: {{ .Release.Service | quote }}
    {{- with .Values.imgproxy.resources.common.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        {{- range .Values.ingress.hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: {{ $.Values.ingress.path | quote }}
            pathType: {{ $.Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "acdh-imgproxy.cacheName" $ }}
                port:
                  number: {{ $.Values.cache.service.port }}
    {{- end }}
{{- end }}

