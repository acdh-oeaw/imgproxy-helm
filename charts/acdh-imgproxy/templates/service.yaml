apiVersion: v1
kind: Service
metadata:
  name: {{ include "acdh-imgproxy.cacheName" . }}
  labels:
    {{- include "acdh-imgproxy.labels" . | nindent 4 }}
    app.kubernetes.io/name: imgproxy-cache
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    {{- include "acdh-imgproxy.cacheSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.cache.service.port }}
      targetPort: http
      protocol: TCP

