proxy_cache_path /var/cache/nginx/imgproxy
	levels=1:2
	keys_zone=imgproxy_cache:__KEYS_ZONE_SIZE__
	max_size=__CACHE_MAX_SIZE__
	inactive=__INACTIVE__
	use_temp_path=off;

log_format imgproxy_cache
	'$remote_addr - $request '
	'status=$status bytes=$body_bytes_sent '
	'cache=$upstream_cache_status upstream=$upstream_addr '
	'request_time=$request_time upstream_time=$upstream_response_time';

upstream imgproxy_origin {
	server __ORIGIN_SERVICE__.__NAMESPACE__.svc.cluster.local:__ORIGIN_PORT__;
	keepalive 32;
}
	    
otel_exporter {
	endpoint __OTEL_ENDPOINT__;
}
otel_service_name imgproxy_cache;
otel_trace on;
otel_trace_context propagate;

server {
	listen 8080;
	server_name _;

	access_log /dev/stdout imgproxy_cache;

	location = /health {
		access_log off;
		default_type text/plain;
		return 200 "nginx cache is running\n";
	}

	location / {
		proxy_pass http://imgproxy_origin;
		proxy_http_version 1.1;
		proxy_set_header Connection "";

		proxy_cache imgproxy_cache;

		# Output currently depends only on the signed URL. Include $http_accept if format
		# negotiation is enabled in imgproxy later.
		proxy_cache_key "$request_uri";

		proxy_cache_valid 200 __VALID_SUCCESS__;
		proxy_cache_valid 404 __VALID_NOT_FOUND__;
		proxy_cache_use_stale error timeout updating invalid_header http_500 http_502 http_503 http_504;
		proxy_cache_background_update on;
		proxy_cache_lock on;
		proxy_cache_lock_age 10s;
		proxy_cache_lock_timeout 10s;
		proxy_cache_revalidate on;

		proxy_cache_bypass $http_pragma $http_authorization;
		proxy_no_cache $http_pragma $http_authorization;

		add_header X-Cache-Status $upstream_cache_status always;
	}
}
