name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    name: Helm chart
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.2

      - name: Add upstream Helm repository
        run: helm repo add imgproxy https://helm.imgproxy.net/

      - name: Build dependencies
        run: helm dependency build charts/acdh-imgproxy

      - name: Lint chart
        run: helm lint charts/acdh-imgproxy

      - name: Render chart
        run: helm template imgproxy charts/acdh-imgproxy --namespace imgproxy
  release:
    name: Publish Helm chart
    runs-on: ubuntu-24.04
    needs: 
      - validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.2

      - name: Add upstream Helm repository
        run: helm repo add imgproxy https://helm.imgproxy.net/

      - name: Build dependencies
        run: helm dependency build charts/acdh-imgproxy

      - name: Publish chart
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: charts
