name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  chart:
    name: Helm chart
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.0

      - name: Add upstream Helm repository
        run: helm repo add imgproxy https://helm.imgproxy.net/

      - name: Build dependencies
        run: helm dependency build charts/acdh-imgproxy

      - name: Lint chart
        run: helm lint charts/acdh-imgproxy

      - name: Render chart
        run: helm template imgproxy charts/acdh-imgproxy --namespace imgproxy
